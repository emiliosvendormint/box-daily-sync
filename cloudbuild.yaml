# Substitution defaults — override via --substitutions flag or Cloud Build trigger config.
#
# Secrets must exist in Secret Manager before deploying:
#   dms3-app-database-url                APP_DATABASE_URL
#   BOX_CLIENT_ID                        BOX_CLIENT_ID
#   BOX_CLIENT_SECRET                    BOX_CLIENT_SECRET
#   BOX_SUBJECT_ID                       BOX_SUBJECT_ID
#   dms3-documents-gcs-bucket-name       GCS_BUCKET_NAME
#   GOOGLE_CREDS                         GOOGLE_CREDS  (optional, omit if using Workload Identity)

substitutions:
  _REGION: us-central1
  _AR_REPO: box-daily-sync
  _JOB_NAME: box-daily-sync
  _SERVICE_ACCOUNT: box-daily-sync@PROJECT_ID.iam.gserviceaccount.com
  _CLOUDSQL_INSTANCE: dev-dms20:us-central1:dev-dms20-pg

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/box-daily-sync:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/box-daily-sync:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - $_JOB_NAME
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/box-daily-sync:$COMMIT_SHA
      - --region=$_REGION
      - --service-account=$_SERVICE_ACCOUNT
      - --add-cloudsql-instances=$_CLOUDSQL_INSTANCE
      - --max-retries=0
      - --task-timeout=12h
      - --set-secrets=APP_DATABASE_URL=dms3-app-database-url:latest,BOX_CLIENT_ID=BOX_CLIENT_ID:latest,BOX_CLIENT_SECRET=BOX_CLIENT_SECRET:latest,BOX_SUBJECT_ID=BOX_SUBJECT_ID:latest,GCS_BUCKET_NAME=dms3-documents-gcs-bucket-name:latest,GOOGLE_CREDS=GOOGLE_CREDS:latest

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/box-daily-sync:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
